name: Investment Bot

on:
  schedule:
    - cron: '0 * * * *'      # Every hour - news + congress check
    - cron: '0 8 * * 1'      # Every Monday 8am - weekly stock suggestions
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'news'
        type: choice
        options:
          - news
          - weekly
          - congress

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic feedparser requests schedule

      - name: Run news and congress check
        if: github.event.schedule == '0 * * * *' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'news') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'congress')
        run: python bot.py --once
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Send weekly stock suggestions
        if: github.event.schedule == '0 8 * * 1' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'weekly')
        run: python bot.py --weekly
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
