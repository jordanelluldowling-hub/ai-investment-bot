name: AI Investment Bot v2

on:
  schedule:
    # News check — every hour
    - cron: '0 * * * *'
    # Morning briefing — every day at 8am UTC
    - cron: '0 8 * * *'
    # IPO check — every day at 7am UTC
    - cron: '0 7 * * *'
    # Daily congressional summary — every day at 6pm UTC
    - cron: '0 18 * * *'
    # Weekly performance report — every Sunday at 9am UTC
    - cron: '0 9 * * 0'

  # Allow manual trigger with mode selection
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which mode to run'
        required: true
        default: 'news'
        type: choice
        options:
          - news
          - congress
          - daily-summary
          - weekly
          - ipo
          - morning
          - performance
          - test

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Allow writing back to repo (for alert history)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ---- Restore alert history from previous run ----
      - name: Restore alert history cache
        uses: actions/cache@v4
        with:
          path: data/
          key: alert-data-${{ github.ref_name }}
          restore-keys: |
            alert-data-

      # ---- Determine mode for scheduled runs ----
      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)   # 1=Monday, 7=Sunday
            # Sunday 9am → weekly performance report
            if [ "$DOW" = "7" ] && [ "$HOUR" = "09" ]; then
              echo "MODE=performance" >> $GITHUB_OUTPUT
            # Monday 8am → weekly picks (takes priority over morning briefing)
            elif [ "$DOW" = "1" ] && [ "$HOUR" = "08" ]; then
              echo "MODE=weekly" >> $GITHUB_OUTPUT
            # Every day 8am (Tue-Sat) → morning briefing
            elif [ "$HOUR" = "08" ]; then
              echo "MODE=morning" >> $GITHUB_OUTPUT
            # Every day 6pm → daily congress summary
            elif [ "$HOUR" = "18" ]; then
              echo "MODE=daily-summary" >> $GITHUB_OUTPUT
            # Every day 7am → IPO check
            elif [ "$HOUR" = "07" ]; then
              echo "MODE=ipo" >> $GITHUB_OUTPUT
            # All other hours → news + congress check
            else
              echo "MODE=news" >> $GITHUB_OUTPUT
            fi
          fi

      # ---- Run the bot ----
      - name: Run news check
        if: steps.mode.outputs.MODE == 'news'
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --mode news

      - name: Run congressional trade check
        if: steps.mode.outputs.MODE == 'news' || steps.mode.outputs.MODE == 'congress'
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --mode congress

      - name: Run daily congress summary
        if: steps.mode.outputs.MODE == 'daily-summary'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python bot.py --mode daily-summary

      - name: Run weekly stock picks
        if: steps.mode.outputs.MODE == 'weekly'
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --mode weekly

      - name: Run IPO tracker
        if: steps.mode.outputs.MODE == 'ipo'
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --mode ipo

      - name: Run morning briefing
        if: steps.mode.outputs.MODE == 'morning'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --mode morning

      - name: Run weekly performance report
        if: steps.mode.outputs.MODE == 'performance'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python performance.py --send

      - name: Run test
        if: steps.mode.outputs.MODE == 'test'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python bot.py --mode test

      # ---- Save alert history for next run ----
      - name: Save alert history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: alert-data-${{ github.ref_name }}-${{ github.run_id }}
